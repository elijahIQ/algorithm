let questions = [];
let userAnswers = [];
let results = [];
let currentPage = 0;
let totalQuestions = 0;
let timerInterval;
let quizSubmitted = false;
const pageSize = 5;

// SHUFFLE
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// START QUIZ
function startQuiz(){
  const count = parseInt(document.getElementById("range").value);
  const minutes = parseInt(document.getElementById("timeLimit").value);

  if(!count || !minutes || count > questionsOriginal.length){
    alert("Enter valid number of questions and time.");
    return;
  }

  clearInterval(timerInterval);
  document.getElementById("scoreBox").innerHTML="";
  document.getElementById("timer").innerText="";
  document.getElementById("submitAll").style.display="none";

  questions = shuffle([...questionsOriginal]).slice(0,count);
  totalQuestions = questions.length;
  userAnswers = Array(totalQuestions).fill("");
  results = Array(totalQuestions).fill(null);
  quizSubmitted = false;
  currentPage = 0;

  loadPage();
  startTimer(minutes*60);
}

// TIMER
function startTimer(seconds){
  timerInterval = setInterval(()=>{
    let m=Math.floor(seconds/60);
    let s=seconds%60;

    document.getElementById("timer").innerText=
      `Time Left: ${m}:${s.toString().padStart(2,'0')}`;

    if(seconds <= 0){
      clearInterval(timerInterval);
      submitQuiz();
    }
    seconds--;
  },1000);
}

// LOAD PAGE
function loadPage(){
  const area = document.getElementById("quizArea");
  area.innerHTML="";

  const start=currentPage*pageSize;
  const end=Math.min(start+pageSize,totalQuestions);

  for(let i=start;i<end;i++){
    let disabled = quizSubmitted ? "disabled" : "";
    let optionsHtml = questions[i].options.map(opt =>
      `<label>
         <input type="radio" name="q${i}" value="${opt}" ${userAnswers[i]===opt?"checked":""} ${disabled} 
           onclick="saveAnswer(${i},'${opt}')"> ${opt}
       </label><br>`
    ).join("");

    area.innerHTML+=`
      <div class="question-box">
        <p><b>Q${i+1}.</b> ${questions[i].q}</p>
        ${optionsHtml}
        <div class="feedback ${results[i]===true?'correct':results[i]===false?'wrong':''}" id="fb${i}">
          ${results[i]===true ? "Correct!" :
            results[i]===false ? "Wrong! Correct: "+questions[i].answer : ""}
        </div>
      </div>`;
  }

  document.getElementById("prevBtn").style.display =
    currentPage===0 ? "none":"inline-block";

  document.getElementById("nextBtn").style.display =
    end===totalQuestions ? "none":"inline-block";

  checkIfAllAnswered();
}

// SAVE ANSWER
function saveAnswer(index,value){
  userAnswers[index] = value;
  checkIfAllAnswered();
}

// CHECK IF ALL ANSWERED
function checkIfAllAnswered(){
  const allAnswered = userAnswers.every(ans => ans !== "");
  if(!quizSubmitted){
    document.getElementById("submitAll").style.display =
      allAnswered ? "block" : "none";
  }
}

// NAVIGATION
function prevPage(){
  if(currentPage>0){
    currentPage--;
    loadPage();
  }
}

function nextPage(){
  if((currentPage+1)*pageSize<totalQuestions){
    currentPage++;
    loadPage();
  }
}

// SUBMIT QUIZ
function submitQuiz(){
  if(quizSubmitted) return;

  clearInterval(timerInterval);
  quizSubmitted = true;

  let score=0;

  for(let i=0;i<totalQuestions;i++){
    const correct = userAnswers[i] === questions[i].answer;
    results[i] = correct;
    if(correct) score++;
  }

  document.getElementById("submitAll").style.display="none";
  document.getElementById("scoreBox").innerHTML=
    `Your Score: ${score} / ${totalQuestions}`;

  loadPage();
}
</script>
